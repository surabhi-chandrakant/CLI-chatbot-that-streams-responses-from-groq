<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 12px;
            opacity: 0.8;
        }

        .stats {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .stat-label {
            opacity: 0.8;
        }

        .stat-value {
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .controls {
            padding: 20px;
            flex: 1;
        }

        .test-status {
            padding: 15px;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }

        .test-status .success {
            color: #4ade80;
        }

        .test-status .error {
            color: #f87171;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 20px 0 0 20px;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }

        .chat-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
            background: #667eea;
            color: white;
            font-size: 18px;
        }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            width: auto;
            padding: 12px 30px;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: inline-block;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <h1>🤖 Groq AI</h1>
                <p>Llama 3.3 70B</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Model</span>
                    <span class="stat-value">Llama 3.3 70B</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Context</span>
                    <span class="stat-value">128K tokens</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Speed</span>
                    <span class="stat-value">~300 tokens/sec</span>
                </div>
            </div>
            <div class="controls">
                <button onclick="clearChat()">🗑️ Clear Chat</button>
                <button onclick="exportChat()">💾 Export Chat</button>
                <button onclick="testAPI()">🔧 Test API</button>
            </div>
            <div class="test-status" id="testStatus">
                ⚡ Status: Ready
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <h2>💬 AI Chat Assistant</h2>
                <p>Powered by Groq's Llama 3.3 70B • Free Tier</p>
            </div>
            
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="message-content">Hello! I'm your AI assistant powered by Groq's Llama 3.3 70B model. How can I help you today?</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleEnter(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let isWaiting = false;

        async function testAPI() {
            const statusDiv = document.getElementById('testStatus');
            statusDiv.innerHTML = '🔄 Testing API...';
            
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                
                if (response.ok && data.status === 'ok') {
                    statusDiv.innerHTML = '✅ API Working! Model: ' + (data.model || 'Llama 3.3');
                    statusDiv.style.color = '#4ade80';
                    setTimeout(() => {
                        statusDiv.innerHTML = '⚡ Status: Ready';
                        statusDiv.style.color = 'white';
                    }, 3000);
                } else {
                    statusDiv.innerHTML = '❌ Error: ' + (data.error || 'Unknown');
                    statusDiv.style.color = '#f87171';
                }
            } catch (error) {
                statusDiv.innerHTML = '❌ Connection Error';
                statusDiv.style.color = '#f87171';
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !isWaiting) {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message || isWaiting) return;
            
            input.value = '';
            isWaiting = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            // Add user message
            addMessage(message, 'user');
            
            // Add assistant placeholder
            const assistantMsgId = addAssistantPlaceholder();
            let fullResponse = '';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    fullResponse += data.token;
                                    updateAssistantMessage(assistantMsgId, fullResponse);
                                } else if (data.error) {
                                    updateAssistantMessage(assistantMsgId, `Error: ${data.error}`);
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
                
                // If no response from streaming, try non-streaming
                if (!fullResponse) {
                    updateAssistantMessage(assistantMsgId, 'Getting response...');
                    const fallbackResponse = await fetch('/api/chat/simple', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message })
                    });
                    const fallbackData = await fallbackResponse.json();
                    if (fallbackData.response) {
                        updateAssistantMessage(assistantMsgId, fallbackData.response);
                    } else if (fallbackData.error) {
                        updateAssistantMessage(assistantMsgId, `Error: ${fallbackData.error}`);
                    }
                }
                
            } catch (error) {
                console.error('Error:', error);
                updateAssistantMessage(assistantMsgId, `Connection error: ${error.message}`);
            } finally {
                isWaiting = false;
                sendBtn.disabled = false;
                input.focus();
                scrollToBottom();
            }
        }
        
        function addMessage(content, role) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }
        
        function addAssistantPlaceholder() {
            const messagesDiv = document.getElementById('messages');
            const msgId = 'msg_' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.id = msgId;
            messageDiv.className = 'message assistant';
            messageDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
            return msgId;
        }
        
        function updateAssistantMessage(msgId, content) {
            const messageDiv = document.getElementById(msgId);
            if (messageDiv) {
                messageDiv.innerHTML = `
                    <div class="avatar">🤖</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                `;
                scrollToBottom();
            }
        }
        
        async function clearChat() {
            if (!confirm('Clear conversation?')) return;
            
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            addMessage('Conversation cleared! How can I help you?', 'assistant');
        }
        
        function exportChat() {
            const messages = document.querySelectorAll('.message');
            let exportText = 'Groq AI Chat Export\n';
            exportText += '='.repeat(50) + '\n';
            exportText += `Date: ${new Date().toLocaleString()}\n`;
            exportText += '='.repeat(50) + '\n\n';
            
            messages.forEach(msg => {
                const role = msg.classList.contains('user') ? 'User' : 'Assistant';
                const content = msg.querySelector('.message-content').innerText;
                exportText += `${role}: ${content}\n\n`;
            });
            
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${new Date().toISOString().slice(0,19)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function scrollToBottom() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Auto-test API on load
        window.addEventListener('load', () => {
            document.getElementById('userInput').focus();
            setTimeout(testAPI, 500);
        });
    </script>
</body>
</html>
